repoPaths:
  snyt45/*: ~/work/*
  toypo/*: ~/work/*

prSections:
  - title: My PRs
    filters: is:open author:@me
  - title: Open PRs
    filters: is:open
  - title: Review Requested
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me

keybindings:
  prs:
    - key: d
      command: |-
        cd {{.RepoPath}} &&
        gh pr checkout {{.PrNumber}} &&
        nvim -c ":CodeDiff origin/{{.BaseRefName}}"
    - key: C
      command: |-
        cd {{.RepoPath}} &&
        gh pr checkout {{.PrNumber}} &&
        nvim -c ":Octo pr edit {{.PrNumber}}"

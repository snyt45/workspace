set-option -g status-bg default
set-option -g status-style bg=default

set-option -g window-style 'bg=default'
set-option -g window-active-style 'bg=default'
set-option -g pane-border-style 'fg=#585b70'
set-option -g pane-active-border-style 'fg=#89b4fa'

# prefixキーをC-tに変更する
set-option -g prefix C-t

# ステータスラインを上に表示する
set-option -g status-position top

# フォーカスイベントを有効にする（外部変更の自動検知に必要）
set-option -g focus-events on

#マウス操作を有効にする
set-option -g mouse on

# History
set-option -g history-limit 100000

# ウィンドウ番号を1から開始（0は遠い）
set -g base-index 1
setw -g pane-base-index 1

# スクロールアップするとコピーモードに入る
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# 最後までスクロールダウンするとコピーモードを抜ける
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# ペイン移動（Prefix付き）
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ペインを垂直分割する
bind v split-window -h -c '#{pane_current_path}'
# ペインを水平分割する
bind s split-window -v -c '#{pane_current_path}'

# セッション一覧を表示
bind S choose-tree -s

# ペイン番号を表示
bind i display-panes

# ペインをズーム（全画面）
bind t resize-pane -Z
# ペインを縦方向のみズーム（横レイアウト維持）
bind T run-shell "$HOME/bin/tmux-partial-zoom"

# ペインを終了
bind q kill-pane

# ウィンドウ内の複数ペイン同時操作 ON
bind e setw synchronize-panes on
# ウィンドウ内の複数ペイン同時操作 OFF
bind E setw synchronize-panes off

# 設定リロードのショートカット
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'

# catppuccin風のウィンドウ表示（rounded pill）
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "icon"
# 自動リネーム中はパス末尾、手動リネーム後はウィンドウ名を表示
set -g @catppuccin_window_text " #{?automatic_rename,#{b:pane_current_path},#W}"
set -g @catppuccin_window_current_text " #{?automatic_rename,#{b:pane_current_path},#W}"

# Catppuccin
set -g @catppuccin_flavor 'mocha'

# Initialize TMUX plugin manager (最下部固定)
run '~/.tmux/plugins/tpm/tpm'

# ステータスバー: 左にセッション、ウィンドウpillは自動設定
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-left-length 100
set -g status-right ""

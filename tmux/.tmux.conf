set-option -g status-bg default
set-option -g status-style bg=default

set-option -g window-style 'bg=default'
set-option -g window-active-style 'bg=default'
set-option -g pane-border-style 'fg=#585b70'
set-option -g pane-active-border-style 'fg=#89b4fa'

# prefixキーをC-tに変更する
set-option -g prefix C-t

# フォーカスイベントを有効にする（外部変更の自動検知に必要）
set-option -g focus-events on

#マウス操作を有効にする
set-option -g mouse on

# History
set-option -g history-limit 100000

# スクロールアップするとコピーモードに入る
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# 最後までスクロールダウンするとコピーモードを抜ける
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# ペイン移動（Prefix付き）
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# vim-tmux-navigator（Ctrl+h/j/k/lでNeovim/tmuxペイン間をシームレス移動）
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# C-lでの画面クリア（vim-tmux-navigatorがC-lを使うため）
bind C-l send-keys 'C-l'

# ペインを垂直分割する
bind v split-window -h -c '#{pane_current_path}'
# ペインを水平分割する
bind s split-window -v -c '#{pane_current_path}'

# ペイン番号を表示
bind i display-panes

# ペインをズーム
bind t resize-pane -Z

# ペインを終了
bind q kill-pane

# ウィンドウ内の複数ペイン同時操作 ON
bind e setw synchronize-panes on
# ウィンドウ内の複数ペイン同時操作 OFF
bind E setw synchronize-panes off

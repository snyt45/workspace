# prefixキーをC-tに変更する
set-option -g prefix C-t

# ステータスラインを上に表示する
set-option -g status-position top

# フォーカスイベントを有効にする（外部変更の自動検知に必要）
set-option -g focus-events on

#マウス操作を有効にする
set-option -g mouse on

# History
set-option -g history-limit 100000

# ウィンドウ番号を1から開始（0は遠い）
set -g base-index 1
setw -g pane-base-index 1

# スクロールアップするとコピーモードに入る
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# 最後までスクロールダウンするとコピーモードを抜ける
bind-key -n WheelDownPane select-pane -t= \; send-keys -M

# ペイン移動（Prefix付き）
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# ペインを方向にスワップ（Shift+hjkl）
bind -r H swap-pane -s '{left-of}'
bind -r J swap-pane -s '{down-of}'
bind -r K swap-pane -s '{up-of}'
bind -r L swap-pane -s '{right-of}'

# ウィンドウを左右に並び替え（移動先にフォーカスも追従）
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# ウィンドウ移動をリピート可能に
bind -r n next-window
bind -r p previous-window

# ペインを垂直分割する
bind v split-window -h -c '#{pane_current_path}'
# ペインを水平分割する
bind s split-window -v -c '#{pane_current_path}'

# セッション一覧を表示
bind S choose-tree -s

# ペイン番号を表示
bind i display-panes

# ペインをズーム（全画面）
bind t resize-pane -Z
# ペインを縦方向のみズーム（横レイアウト維持）
bind T run-shell "$HOME/bin/tmux-partial-zoom"

# ペインを終了
bind q kill-pane

# ウィンドウ内の複数ペイン同時操作 ON
bind e setw synchronize-panes on
# ウィンドウ内の複数ペイン同時操作 OFF
bind E setw synchronize-panes off

# 設定リロードのショートカット
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Plugins (tpm)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "none"

set -g @catppuccin_window_status_style "none"

# プレーンテキスト化に伴う active/inactive の色分け
set -g window-status-style "fg=#{@thm_overlay_0}"
set -g window-status-current-style "fg=#{@thm_mauve},bold"

# ベル・活動通知は背景色を消して文字色だけに
set -g window-status-bell-style "fg=#{@thm_yellow}"
set -g window-status-activity-style "fg=#{@thm_lavender}"

# ベル・活動・ズームのみアイコン表示（current は mauve+bold で区別できるので省略）
set -g @window_flags "#{?window_activity_flag,#{E:@catppuccin_window_flags_icon_activity},}#{?window_bell_flag,#{E:@catppuccin_window_flags_icon_bell},}#{?window_zoomed_flag,#{E:@catppuccin_window_flags_icon_zoom},}"
set -g window-status-format " #I #W#{E:@window_flags}"
set -g window-status-current-format " #I #W#{E:@window_flags}"

set -g status-left ""
set -g status-right ""
set -g status-justify absolute-centre

# Initialize TMUX plugin manager (最下部固定)
run '~/.tmux/plugins/tpm/tpm'

# tmux(prefix C-t)の操作感に合わせた最小構成。ここにない項目はデフォルトに従う
# デフォルト一覧: herdr --default-config

onboarding = false

[theme]
name = "catppuccin"

[ui]
# ペイン間の余白をなくし境界線を共有する(tmuxと同じ密度)。数値指定は不可でon/offのみ
pane_gaps = false

[keys]
prefix = "ctrl+t"

# tmuxの s(水平分割) に合わせる（デフォルトは prefix+minus）
split_horizontal = "prefix+s"
# split_horizontal に prefix+s を譲る
settings = "prefix+shift+s"

# tmuxの t(ズーム) に合わせる（デフォルトは prefix+z）
zoom = "prefix+t"

# tmuxの d(デタッチ) / q(ペイン閉じる) に合わせる（デフォルトは detach=q, close_pane=x）
detach = "prefix+d"
close_pane = "prefix+q"

# tmuxの ,(ウィンドウ名変更) に合わせる（デフォルトは prefix+shift+t）
rename_tab = "prefix+comma"

# blocked / done(unread) な agent pane を巡回フォーカス
[[keys.command]]
key = "prefix+shift+u"
type = "pane"
command = "/Users/snyt45/bin/herdr-unread"
